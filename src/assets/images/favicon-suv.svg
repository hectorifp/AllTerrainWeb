<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <g fill="#1a1a1a">
    <!-- Main Body Shape -->
    <path d="M 15 80 
             L 15 35 
             L 75 35 
             L 88 48 
             L 112 48 
             L 112 80 
             Z" />
    
    <!-- Wheel Well Cutouts -->
    <path d="M 22 80 A 15 15 0 0 1 52 80 Z" fill="#fff" />
    <path d="M 72 80 A 15 15 0 0 1 102 80 Z" fill="#fff" />
    
    <!-- Wheels -->
    <circle cx="37" cy="80" r="12" fill="#1a1a1a"/>
    <circle cx="87" cy="80" r="12" fill="#1a1a1a"/>
    <circle cx="37" cy="80" r="4" fill="#f0f0f0"/>
    <circle cx="87" cy="80" r="4" fill="#f0f0f0"/>

    <!-- Windows (Cutouts) -->
    <!-- Rear/Side window -->
    <rect x="22" y="40" width="28" height="15" rx="2" fill="#fff"/>
    <!-- Front window/door -->
    <polygon points="53,40 71,40 79,55 53,55" fill="#fff"/>

    <!-- Spare Tire -->
    <rect x="5" y="45" width="10" height="28" rx="4" fill="#1a1a1a"/>
    
    <!-- Minor details -->
    <!-- Headlight -->
    <rect x="108" y="52" width="4" height="6" fill="#f1c40f"/>
    <!-- Front Bumper -->
    <rect x="110" y="70" width="6" height="8" rx="2" fill="#333"/>
    <!-- Rear Bumper -->
    <rect x="10" y="70" width="5" height="8" rx="2" fill="#333"/>
  </g>
</svg>
